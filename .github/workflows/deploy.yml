name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - name: Locate and Clean Output Directory
        run: |
          # Detect which output directory actually exists
          if [ -d "dist/client" ]; then
            TARGET_DIR="dist/client"
          elif [ -d "dist" ]; then
            TARGET_DIR="dist"
          elif [ -d "build" ]; then
            TARGET_DIR="build"
          elif [ -d "out" ]; then
            TARGET_DIR="out"
          else
            # If no standard folder exists, create one and copy all build outputs
            mkdir -p final_output
            cp -r * final_output/ 2>/dev/null || true
            TARGET_DIR="final_output"
          fi
          
          echo "Found deployment directory: $TARGET_DIR"
          echo "DEPLOY_PATH=$TARGET_DIR" >> $GITHUB_ENV
          
          # Add custom domain configuration file directly into the detected folder
          echo "badaie.com" > "$TARGET_DIR/CNAME"
          # Create a backup index for custom base path clean fallbacks
          cp "$TARGET_DIR/index.html" "$TARGET_DIR/404.html" || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DEPLOY_PATH }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
