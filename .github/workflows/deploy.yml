name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - name: Force Static Routing Output
        run: |
          # Create a non-hidden deployment directory
          mkdir -p final_clean_dist
          
          # Force copy the hidden output files safely into the visible directory
          if [ -d ".output/public" ]; then
            cp -r .output/public/* final_clean_dist/
          elif [ -d ".output" ]; then
            cp -r .output/* final_clean_dist/
          fi
          
          # Inject custom domain tracking files
          echo "badaie.com" > final_clean_dist/CNAME
          if [ -f "final_clean_dist/index.html" ]; then
            cp final_clean_dist/index.html final_clean_dist/404.html
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: final_clean_dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
