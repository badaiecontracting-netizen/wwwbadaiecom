name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - name: Force Static Routing
        run: |
          # Create clean deployment directory
          mkdir -p public_deploy_folder
          
          # Force copy the hidden output files safely
          if [ -d ".output/public" ]; then
            cp -r .output/public/* public_deploy_folder/
          elif [ -d ".output" ]; then
            cp -r .output/* public_deploy_folder/
          else
            cp -r * public_deploy_folder/ 2>/dev/null || true
          fi
          
          # Lock in custom domain and fallbacks
          echo "badaie.com" > public_deploy_folder/CNAME
          cp public_deploy_folder/index.html public_deploy_folder/404.html || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public_deploy_folder
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
