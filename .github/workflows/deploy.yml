name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - name: Re-Route Output Folders to Root
        run: |
          mkdir -p final_root_dist
          # Copy whatever output subfolder Lovable built into the root package path
          if [ -d "dist/wwwbadaiecom" ]; then
            cp -r dist/wwwbadaiecom/* final_root_dist/
          elif [ -d "dist/client" ]; then
            cp -r dist/client/* final_root_dist/
          elif [ -d "dist" ]; then
            cp -r dist/* final_root_dist/
          fi
          # Inject domain tracking records
          echo "badaie.com" > final_root_dist/CNAME
          cp final_root_dist/index.html final_root_dist/404.html || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: final_root_dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
