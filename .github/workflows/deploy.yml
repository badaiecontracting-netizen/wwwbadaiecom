name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - name: Fix Routing and Move Files to Root
        run: |
          mkdir -p final_dist
          if [ -d "dist/client" ]; then
            cp -r dist/client/* final_dist/
          elif [ -d "dist" ]; then
            cp -r dist/* final_dist/
          else
            cp -r * final_dist/
          fi
          # Add custom domain file so GitHub doesn't lose it
          echo "badaie.com" > final_dist/CNAME
          # Create a copy of index for clean custom domain routing
          cp final_dist/index.html final_dist/404.html || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: final_dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
