name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      # Forces the framework to generate a static html deployment export
      - run: bun run build
        env:
          NITRO_PRESET: github-pages
          STATIC: true
      - name: Route Build Artifacts Cleanly
        run: |
          # Locate static folder fallback configurations
          if [ -d ".output/public" ]; then
            TARGET_DIR=".output/public"
          elif [ -d "dist" ]; then
            TARGET_DIR="dist"
          else
            TARGET_DIR="."
          fi
          
          echo "Deploying from: $TARGET_DIR"
          echo "badaie.com" > "$TARGET_DIR/CNAME"
          cp "$TARGET_DIR/index.html" "$TARGET_DIR/404.html" || true
          echo "DEPLOY_PATH=$TARGET_DIR" >> $GITHUB_ENV
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DEPLOY_PATH }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
