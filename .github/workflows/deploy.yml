name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - name: Clean Output for Custom Domain
        run: |
          # Inject custom domain directly into the correct hidden compilation output folder
          if [ -d ".output/public" ]; then
            echo "badaie.com" > .output/public/CNAME
            cp .output/public/index.html .output/public/404.html || true
            echo "DEPLOY_TARGET=.output/public" >> $GITHUB_ENV
          else
            echo "badaie.com" > .output/CNAME
            cp .output/index.html .output/404.html || true
            echo "DEPLOY_TARGET=.output" >> $GITHUB_ENV
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DEPLOY_TARGET }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
