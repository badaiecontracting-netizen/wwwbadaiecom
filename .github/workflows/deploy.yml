name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - name: Debug and Route Build Artifacts Cleanly
        run: |
          mkdir -p final_root_dist
          echo "=== Displaying build directory map ==="
          ls -la
          if [ -d "dist" ]; then ls -la dist/; fi
          
          # Target folder selection logic based on common directory footprints
          if [ -d "dist/wwwbadaiecom" ]; then
            cp -r dist/wwwbadaiecom/* final_root_dist/
          elif [ -d "dist/client" ]; then
            cp -r dist/client/* final_root_dist/
          elif [ -d "dist" ] && [ -f "dist/index.html" ]; then
            cp -r dist/* final_root_dist/
          else
            # Deep search fallback path resolution for index files
            INDEX_PATH=$(find . -name index.html -not -path "*/node_modules/*" -not -path "./final_root_dist/*" | head -n 1)
            if [ ! -z "$INDEX_PATH" ]; then
              TARGET_DIR=$(dirname "$INDEX_PATH")
              echo "Discovered entry layout folder index at: $TARGET_DIR"
              cp -r $TARGET_DIR/* final_root_dist/
            else
              echo "Root fallback mechanism activated"
              cp -r * final_root_dist/ 2>/dev/null || true
            fi
          fi
          
          # Inject final routing mapping parameters
          echo "badaie.com" > final_root_dist/CNAME
          cp final_root_dist/index.html final_root_dist/404.html || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: final_root_dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
